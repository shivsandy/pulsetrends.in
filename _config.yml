title: "PulseTrends — AI, Crypto, Stocks & Daily Trending News"
tagline: "Trending Insights, Delivered Daily"
description: "Expert analysis on AI, technology, cryptocurrency, politics, finance, weather, and business — curated and published daily."
url: "https://pulsetrends.in"
baseurl: ""
locale: "en_US"
timezone: "Asia/Kolkata"
keywords: "trending news, daily insights, AI news, cryptocurrency, bitcoin, stock market, technology, gaming, mobile, sports, entertainment, health, science, business, politics, world news, finance"

markdown: kramdown
permalink: /:title/

# Set your Google AdSense publisher ID (ca-pub-xxxxxxxxxxxxxxxx) to enable ads
google_adsense_id: ""

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
      author: "PulseTrends Editorial Team"
      comments: false
  - scope:
      path: "categories"
    values:
      layout: "category"

exclude:
  - generate_post.py
  - cleanup_posts.py
  - requirements.txt
  - SETUP.md
  - .github/
  - venv/
  - ipodashboard/scraper/
  - static_headers.txt

