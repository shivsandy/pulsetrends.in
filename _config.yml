title: "PulseTrends"
tagline: "Trending Insights, Delivered Daily"
description: "Expert analysis on AI, technology, politics, finance, weather, and business — curated and published daily."
url: "https://pulsetrends.in"
baseurl: ""
locale: "en_US"

markdown: kramdown
permalink: /:title/

google_adsense_id: ""

plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-sitemap

paginate: 12
paginate_path: "/page:num/"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
      author: "PulseTrends Editorial Team"
      comments: false

exclude:
  - generate_post.py
  - requirements.txt
  - SETUP.md
  - .github/
  - venv/
