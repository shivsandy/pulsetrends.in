<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPO Dashboard - PulseTrends</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ipodashboard/style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-top">
        <h1>IPO Dashboard</h1>
        <span class="badge badge-global">Global</span>
      </div>
      <p class="subtitle">Upcoming & Open IPOs across India, USA & Global Markets</p>
      <div class="last-updated" id="lastUpdated"></div>
    </header>

    <div class="controls">
      <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Search by company or symbol..." autocomplete="off">
      </div>
      <div class="filters" id="filterButtons">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="India">India</button>
        <button class="filter-btn" data-filter="USA">USA</button>
        <button class="filter-btn" data-filter="global">Global</button>
        <button class="filter-btn" data-filter="open">Open</button>
        <button class="filter-btn" data-filter="upcoming">Upcoming</button>
      </div>
    </div>

    <div class="table-wrapper">
      <table id="ipoTable">
        <thead>
          <tr>
            <th data-sort="symbol" class="sortable">Symbol <span class="sort-icon"></span></th>
            <th data-sort="company_name" class="sortable">Company <span class="sort-icon"></span></th>
            <th data-sort="exchange" class="sortable">Exchange <span class="sort-icon"></span></th>
            <th data-sort="price_band" class="sortable">Price <span class="sort-icon"></span></th>
            <th data-sort="listing_date" class="sortable">Listing Date <span class="sort-icon"></span></th>
            <th data-sort="issue_size" class="sortable">Issue Size <span class="sort-icon"></span></th>
            <th data-sort="subscription" class="sortable">Subscription <span class="sort-icon"></span></th>
            <th data-sort="status" class="sortable">Status <span class="sort-icon"></span></th>
          </tr>
        </thead>
        <tbody id="ipoBody"></tbody>
      </table>
    </div>

    <div class="status-bar">
      <span id="ipoCount">Loading...</span>
    </div>
  </div>

  <div id="ipoModal" class="modal-overlay hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-wrap">
      <div class="modal-header">
        <div>
          <h2 id="modalTitle"></h2>
          <span class="modal-symbol" id="modalSymbol"></span>
        </div>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body" id="modalBody">
        <section class="detail-card" data-section="about">
          <div class="detail-card-head">
            <h3>About</h3>
            <span class="card-toggle"></span>
          </div>
          <div class="detail-card-body" id="modalAbout"></div>
        </section>
        <section class="detail-card" data-section="ipo_details">
          <div class="detail-card-head">
            <h3>IPO Details</h3>
            <span class="card-toggle"></span>
          </div>
          <div class="detail-card-body" id="modalIpoDetails"></div>
        </section>
        <section class="detail-card" data-section="financials">
          <div class="detail-card-head">
            <h3>Financial Summary</h3>
            <span class="card-toggle"></span>
          </div>
          <div class="detail-card-body" id="modalFinancials"></div>
        </section>
        <section class="detail-card" data-section="strengths">
          <div class="detail-card-head">
            <h3>Strengths</h3>
            <span class="card-toggle"></span>
          </div>
          <div class="detail-card-body" id="modalStrengths"></div>
        </section>
        <section class="detail-card" data-section="risks">
          <div class="detail-card-head">
            <h3>Risks</h3>
            <span class="card-toggle"></span>
          </div>
          <div class="detail-card-body" id="modalRisks"></div>
        </section>
        <section class="detail-card" data-section="scores">
          <div class="detail-card-head">
            <h3>AI Scores</h3>
            <span class="card-toggle"></span>
          </div>
          <div class="detail-card-body" id="modalScores"></div>
        </section>
        <section class="detail-card" data-section="ai_analysis">
          <div class="detail-card-head">
            <h3>AI Analysis</h3>
            <span class="card-toggle"></span>
          </div>
          <div class="detail-card-body" id="modalAiAnalysis"></div>
        </section>
        <section class="detail-card" data-section="verdict">
          <div class="detail-card-head">
            <h3>Verdict</h3>
            <span class="card-toggle"></span>
          </div>
          <div class="detail-card-body" id="modalVerdict"></div>
        </section>
      </div>
    </div>
  </div>

  <script src="/ipodashboard/script.js"></script>
</body>
</html>
