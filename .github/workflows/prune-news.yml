name: Prune Old News — Cleanup & Rebuild

on:
  workflow_dispatch:
    inputs:
      max_age_days:
        description: 'Delete articles older than N days'
        required: false
        default: '20'
      count:
        description: 'Max articles to delete per run'
        required: false
        default: '60'

permissions:
  contents: write

concurrency:
  group: prune-news
  cancel-in-progress: false

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Prune old news articles from newsData.ts
        run: python scripts/prune_old_news.py
        env:
          MAX_AGE_DAYS: ${{ github.event.inputs.max_age_days || '2' }}
          MAX_REMOVE_COUNT: ${{ github.event.inputs.count || '60' }}

      - name: Commit pruned news data
        run: |
          git config user.name "PulseTrends Bot"
          git config user.email "noreply@example.com"
          git add src/data/newsData.ts
          if git diff --cached --quiet; then
            echo "No changes to commit. Skipping."
          else
            git commit -m "Prune: remove old news articles ($(date +%F))"
            git push
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (regenerates sitemap + static pages)
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'PulseTrends Bot'
          user_email: 'noreply@example.com'
          cname: pulsetrends.in
          enable_jekyll: false
