name: Data Pipeline & Deploy

on:
  push:
    branches: [master]
  schedule:
    - cron: '0 5 */3 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests==2.32.3 beautifulsoup4==4.12.3 lxml==5.3.0 flask==3.0.3 flask-cors==4.0.1 apscheduler==3.10.4

      - name: Scrape airdrops.io
        run: python airdrops_scraper.py

      - name: Generate news cache for static build
        env:
          NVIDIA_API_KEY_1: ${{ secrets.NVIDIA_API_KEY_1 }}
          GOOGLE_AI_API_KEY_1: ${{ secrets.GOOGLE_AI_API_KEY_1 }}
          GOOGLE_AI_API_KEY_2: ${{ secrets.GOOGLE_AI_API_KEY_2 }}
          GROQ_API: ${{ secrets.GROQ_API }}
          COHERE_API: ${{ secrets.COHERE_API }}
          MISTRAL_API: ${{ secrets.MISTRAL_API }}
          FINNHUB_API_KEY_1: ${{ secrets.FINNHUB_API_KEY_1 }}
          FINNHUB_API_KEY_2: ${{ secrets.FINNHUB_API_KEY_2 }}
          FINNHUB_API_KEY_3: ${{ secrets.FINNHUB_API_KEY_3 }}
          FINNHUB_API_KEY_4: ${{ secrets.FINNHUB_API_KEY_4 }}
          FINNHUB_API_KEY_5: ${{ secrets.FINNHUB_API_KEY_5 }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          UNSPLASH_ACCESS_KEY_1: ${{ secrets.UNSPLASH_ACCESS_KEY_1 }}
          UNSPLASH_ACCESS_KEY_2: ${{ secrets.UNSPLASH_ACCESS_KEY_2 }}
          UNSPLASH_ACCESS_KEY_3: ${{ secrets.UNSPLASH_ACCESS_KEY_3 }}
        run: python generate_news_cache.py

      - name: Scrape screener.in for new IPOs
        run: python scripts/scrape_screener_ipo.py

      - name: Check IPO availability (auto-close past-date IPOs)
        run: python scripts/check_ipo_availability.py

      - name: Generate 44-section institutional IPO analysis
        run: python scripts/generate_ipo_analysis_44.py --force

      - name: Generate TypeScript data files
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SKIP_NEWS_FETCH: "1"
        run: python generate_data_ts.py

      - name: Commit updated data files
        run: |
          git config user.name "PulseTrends Bot"
          git config user.email "noreply@example.com"
          git add data/ src/data/
          git diff --cached --quiet || git commit -m "Auto: update data $(date +%F)"
          git push

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Deploy to gh-pages branch (zero-downtime)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'PulseTrends Bot'
          user_email: 'noreply@example.com'
          cname: pulsetrends.in
          enable_jekyll: false
