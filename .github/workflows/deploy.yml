name: Data Pipeline & Deploy

on:
  schedule:
    - cron: '0 5 */2 * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests==2.32.3 beautifulsoup4==4.12.3 lxml==5.3.0

      - name: Scrape airdrops.io
        run: python airdrops_scraper.py

      - name: Collect crypto data
        run: python crypto_collector.py

      - name: Analyze crypto projects
        env:
          IPO_AI_API_KEY_1: ${{ secrets.IPO_AI_API_KEY_1 }}
          IPO_AI_API_KEY_2: ${{ secrets.IPO_AI_API_KEY_2 }}
          IPO_AI_API_KEY_3: ${{ secrets.IPO_AI_API_KEY_3 }}
          IPO_AI_API_KEY_4: ${{ secrets.IPO_AI_API_KEY_4 }}
          GOOGLE_AI_API_KEY_1: ${{ secrets.GOOGLE_AI_API_KEY_1 }}
          GOOGLE_AI_API_KEY_2: ${{ secrets.GOOGLE_AI_API_KEY_2 }}
        run: python crypto_analyzer.py

      - name: Generate TypeScript data files
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: python generate_data_ts.py

      - name: Commit updated data files
        run: |
          git config user.name "PulseTrends Bot"
          git config user.email "noreply@example.com"
          git add data/ src/data/
          git diff --cached --quiet || git commit -m "Auto: update data $(date +%F)"
          git push

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Deploy to gh-pages branch
        run: |
          git config user.name "PulseTrends Bot"
          git config user.email "noreply@example.com"
          git fetch origin gh-pages 2>/dev/null || true
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git rm -rfq . 2>/dev/null || true
          git checkout master -- dist/index.html
          mv dist/index.html index.html
          touch .nojekyll
          rm -rf dist
          git add index.html .nojekyll
          git commit -m "Deploy $(date +%F)"
          git push origin gh-pages
