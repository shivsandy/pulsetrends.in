name: Daily News — Premium Pipeline (10 articles)

on:
  schedule:
    # 6 AM Eastern Time = 10:00 UTC (EDT) / 11:00 UTC (EST)
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  generate-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install requests==2.32.3 feedparser==6.0.11

      - name: Generate 10 premium articles (multi-source trend discovery + SEO/GEO/Discover)
        env:
          ZEN_API_KEY: ${{ secrets.ZEN_API_KEY }}
          ZEN_API_KEY2: ${{ secrets.ZEN_API_KEY2 }}
          GOOGLE_AI_API_KEY_1: ${{ secrets.GOOGLE_AI_API_KEY_1 }}
          GOOGLE_AI_API_KEY_2: ${{ secrets.GOOGLE_AI_API_KEY_2 }}
          GROQ_API: ${{ secrets.GROQ_API }}
          COHERE_API: ${{ secrets.COHERE_API }}
          MISTRAL_API: ${{ secrets.MISTRAL_API }}
          NVIDIA_API_KEY_1: ${{ secrets.NVIDIA_API_KEY_1 }}
          UNSPLASH_ACCESS_KEY_1: ${{ secrets.UNSPLASH_ACCESS_KEY_1 }}
          UNSPLASH_ACCESS_KEY_2: ${{ secrets.UNSPLASH_ACCESS_KEY_2 }}
          UNSPLASH_ACCESS_KEY_3: ${{ secrets.UNSPLASH_ACCESS_KEY_3 }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/generate-premium-news.py

      - name: Convert premium JSON to TypeScript (newsData.ts)
        run: python scripts/convert_premium_to_ts.py

      - name: Prune news older than 30 days
        env:
          MAX_AGE_DAYS: "30"
          MAX_REMOVE_COUNT: "60"
        run: python scripts/prune_old_news.py

      - name: Commit new articles
        run: |
          git config user.name "PulseTrends Bot"
          git config user.email "noreply@example.com"
          git add src/data/newsData.ts
          git diff --cached --quiet || git commit -m "Daily premium pipeline: $(date +%F)"
          git push

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps
        run: npm ci

      - name: Build React app
        run: npm run build

      - name: Deploy to gh-pages branch (zero-downtime)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'PulseTrends Bot'
          user_email: 'noreply@example.com'
          cname: pulsetrends.in
          enable_jekyll: false
