name: Global IPO Scanner — 10 Parallel Jobs

on:
  schedule:
    - cron: '0 5 * * *'   # Daily at 5 AM UTC
    - cron: '30 17 * * *'  # Daily at 5:30 PM UTC
  workflow_dispatch:
    inputs:
      force:
        description: 'Force full re-scan'
        type: boolean
        default: false

permissions:
  contents: write
  actions: write

concurrency:
  group: global-ipo-scanner
  cancel-in-progress: false

env:
  PYTHON_VERSION: '3.11'
  FORCE_SCAN: ${{ github.event.inputs.force || false }}

defaults:
  run:
    working-directory: ./

# ─── Shared Setup ────────────────────────────────────────────────────

jobs:
  # ────────────────────────────────────────────────────────────────────
  # JOB 1: India IPO Scanner (NSE/BSE/Chittorgarh/InvestorGain/Screener)
  # ────────────────────────────────────────────────────────────────────
  india-scanner:
    name: 'Job 1 — India Scanner'
    runs-on: ubuntu-latest
    outputs:
      status: ${{ steps.scan.outcome }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install requests
      - name: Scan India IPOs
        id: scan
        continue-on-error: true
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from scanners.india import IndiaScraper
          s = IndiaScraper(); ipos = s.scrape()
          import json; from scanners.base import IPOData
          from datetime import datetime, timezone
          import os
          os.makedirs('data', exist_ok=True)
          with open('data/scan_india.json', 'w') as f:
              json.dump({'source':'India','scanned_at':datetime.now(timezone.utc).isoformat(),'ipos_found':len(ipos),'ipos':[i.to_dict() for i in ipos]}, f, indent=2)
          print(f'India: {len(ipos)} IPOs')
          "

  # ────────────────────────────────────────────────────────────────────
  # JOB 2: US IPO Scanner (Finnhub + SEC EDGAR + Major Stocks)
  # ────────────────────────────────────────────────────────────────────
  us-scanner:
    name: 'Job 2 — US Scanner'
    runs-on: ubuntu-latest
    env:
      FINNHUB_API_KEY_1: ${{ secrets.FINNHUB_API_KEY_1 }}
      FINNHUB_API_KEY_2: ${{ secrets.FINNHUB_API_KEY_2 }}
      FINNHUB_API_KEY_3: ${{ secrets.FINNHUB_API_KEY_3 }}
      FINNHUB_API_KEY_4: ${{ secrets.FINNHUB_API_KEY_4 }}
      FINNHUB_API_KEY_5: ${{ secrets.FINNHUB_API_KEY_5 }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install requests
      - name: Scan US IPOs
        continue-on-error: true
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from scanners.us import USScraper
          s = USScraper(); ipos = s.scrape()
          import json; from datetime import datetime, timezone
          import os; os.makedirs('data', exist_ok=True)
          with open('data/scan_us.json', 'w') as f:
              json.dump({'source':'US','scanned_at':datetime.now(timezone.utc).isoformat(),'ipos_found':len(ipos),'ipos':[i.to_dict() for i in ipos]}, f, indent=2)
          print(f'US: {len(ipos)} IPOs')
          "

  # ────────────────────────────────────────────────────────────────────
  # JOB 3: Europe IPO Scanner (LSE/Euronext)
  # ────────────────────────────────────────────────────────────────────
  europe-scanner:
    name: 'Job 3 — Europe Scanner'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install requests
      - name: Scan Europe IPOs
        continue-on-error: true
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from scanners.europe import EuropeScraper
          s = EuropeScraper(); ipos = s.scrape()
          import json; from datetime import datetime, timezone
          import os; os.makedirs('data', exist_ok=True)
          with open('data/scan_europe.json', 'w') as f:
              json.dump({'source':'Europe','scanned_at':datetime.now(timezone.utc).isoformat(),'ipos_found':len(ipos),'ipos':[i.to_dict() for i in ipos]}, f, indent=2)
          print(f'Europe: {len(ipos)} IPOs')
          "

  # ────────────────────────────────────────────────────────────────────
  # JOB 4: Asia-Pacific IPO Scanner (HKEX/ASX)
  # ────────────────────────────────────────────────────────────────────
  apac-scanner:
    name: 'Job 4 — Asia-Pacific Scanner'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install requests
      - name: Scan Asia-Pacific IPOs
        continue-on-error: true
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from scanners.asia_pacific import AsiaPacificScraper
          s = AsiaPacificScraper(); ipos = s.scrape()
          import json; from datetime import datetime, timezone
          import os; os.makedirs('data', exist_ok=True)
          with open('data/scan_apac.json', 'w') as f:
              json.dump({'source':'Asia-Pacific','scanned_at':datetime.now(timezone.utc).isoformat(),'ipos_found':len(ipos),'ipos':[i.to_dict() for i in ipos]}, f, indent=2)
          print(f'APAC: {len(ipos)} IPOs')
          "

  # ────────────────────────────────────────────────────────────────────
  # JOB 5: Middle East IPO Scanner (Tadawul/ADX/DFM)
  # ────────────────────────────────────────────────────────────────────
  me-scanner:
    name: 'Job 5 — Middle East Scanner'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install requests
      - name: Scan Middle East IPOs
        continue-on-error: true
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from scanners.middle_east import MiddleEastScraper
          s = MiddleEastScraper(); ipos = s.scrape()
          import json; from datetime import datetime, timezone
          import os; os.makedirs('data', exist_ok=True)
          with open('data/scan_me.json', 'w') as f:
              json.dump({'source':'MiddleEast','scanned_at':datetime.now(timezone.utc).isoformat(),'ipos_found':len(ipos),'ipos':[i.to_dict() for i in ipos]}, f, indent=2)
          print(f'Middle East: {len(ipos)} IPOs')
          "

  # ────────────────────────────────────────────────────────────────────
  # JOB 6: Financial Analyzer (depends on Jobs 1-5)
  # ────────────────────────────────────────────────────────────────────
  financial-analyzer:
    name: 'Job 6 — Financial Analyzer'
    runs-on: ubuntu-latest
    needs: [india-scanner, us-scanner, europe-scanner, apac-scanner, me-scanner]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install requests
      - name: Analyze financial data
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          import json, os, glob
          from engine.financial_analyzer import FinancialAnalyzer
          analyzer = FinancialAnalyzer()
          all_ipos = []
          for f in glob.glob('data/scan_*.json'):
              try:
                  with open(f) as fh: data = json.load(fh)
                  all_ipos.extend(data.get('ipos', []))
              except: pass
          results = []
          for ipo in all_ipos:
              analysis = analyzer.analyze(ipo)
              results.append({'id': ipo.get('id'), 'name': ipo.get('name'), 'financials': analysis})
          with open('data/financial_analysis.json', 'w') as f:
              json.dump(results, f, indent=2)
          print(f'Financial analysis: {len(results)} IPOs')
          "

  # ────────────────────────────────────────────────────────────────────
  # JOB 7: Valuation Engine (depends on Jobs 1-5)
  # ────────────────────────────────────────────────────────────────────
  valuation-engine:
    name: 'Job 7 — Valuation Engine'
    runs-on: ubuntu-latest
    needs: [india-scanner, us-scanner, europe-scanner, apac-scanner, me-scanner]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install requests
      - name: Run valuation analysis
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          import json, os, glob
          from engine.financial_analyzer import FinancialAnalyzer
          analyzer = FinancialAnalyzer()
          valuations = []
          for f in glob.glob('data/scan_*.json'):
              try:
                  with open(f) as fh: data = json.load(fh)
                  for ipo in data.get('ipos', []):
                      metrics = analyzer.analyze(ipo)
                      peer = analyzer.compare_peers(ipo)
                      projections = analyzer.project_financials(ipo)
                      valuations.append({
                          'id': ipo.get('id'),
                          'name': ipo.get('name'),
                          'valuation_score': metrics.valuation_score,
                          'pe_ratio': metrics.pe_ratio,
                          'peer_comparison': peer,
                          'projections': [{'year': p.year, 'eps': p.eps} for p in projections],
                      })
              except: pass
          with open('data/valuation_results.json', 'w') as f:
              json.dump(valuations, f, indent=2)
          print(f'Valuations: {len(valuations)} IPOs')
          "

  # ────────────────────────────────────────────────────────────────────
  # JOB 8: AI Scoring Engine (depends on Jobs 1-5)
  # ────────────────────────────────────────────────────────────────────
  ai-scoring:
    name: 'Job 8 — AI Scoring Engine'
    runs-on: ubuntu-latest
    needs: [india-scanner, us-scanner, europe-scanner, apac-scanner, me-scanner]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install requests
      - name: Score all IPOs
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          import json, os, glob
          from engine.scorer import ScoringEngine
          engine = ScoringEngine()
          all_scored = []
          for f in glob.glob('data/scan_*.json'):
              try:
                  with open(f) as fh: data = json.load(fh)
                  for ipo in data.get('ipos', []):
                      breakdown = engine.score_from_data(ipo)
                      result = breakdown.to_dict()
                      result['id'] = ipo.get('id')
                      result['name'] = ipo.get('name')
                      all_scored.append(result)
              except: pass
          all_scored.sort(key=lambda x: x.get('final_score', 0), reverse=True)
          with open('data/ai_scores.json', 'w') as f:
              json.dump(all_scored, f, indent=2)
          with open('data/ipo_scores_ranking.json', 'w') as f:
              json.dump({'generated_at': __import__('datetime').datetime.now().isoformat(), 'total': len(all_scored), 'rankings': all_scored}, f, indent=2)
          print(f'Scored: {len(all_scored)} IPOs')
          "

  # ────────────────────────────────────────────────────────────────────
  # JOB 9: News & Sentiment Engine (depends on Jobs 1-5)
  # ────────────────────────────────────────────────────────────────────
  news-sentiment:
    name: 'Job 9 — News & Sentiment'
    runs-on: ubuntu-latest
    needs: [india-scanner, us-scanner, europe-scanner, apac-scanner, me-scanner]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install requests
      - name: Generate news sentiment
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          import json, os, glob
          all_ipos = []
          for f in glob.glob('data/scan_*.json'):
              try:
                  with open(f) as fh: data = json.load(fh)
                  all_ipos.extend(data.get('ipos', []))
              except: pass
          sentiment = []
          for ipo in all_ipos:
              name = ipo.get('name', '')
              ticker = ipo.get('ticker', '')
              gmp = float(ipo.get('gmp', 0) or 0)
              sub = ipo.get('subscriptionStatus', '')
              sent = 'neutral'
              if gmp > 50: sent = 'very positive'
              elif gmp > 20: sent = 'positive'
              elif gmp < 0: sent = 'negative'
              if 'x' in sub:
                  try:
                      sv = float(sub.replace('x',''))
                      if sv > 50: sent = 'very positive'
                  except: pass
              sentiment.append({'id': ipo.get('id'), 'name': name, 'ticker': ticker, 'sentiment': sent, 'gmp': gmp})
          with open('data/news_sentiment.json', 'w') as f:
              json.dump({'generated_at': __import__('datetime').datetime.now().isoformat(), 'sentiment': sentiment}, f, indent=2)
          print(f'Sentiment: {len(sentiment)} IPOs')
          "

  # ────────────────────────────────────────────────────────────────────
  # JOB 10: Database Synchronization (depends on Jobs 6-9)
  # ────────────────────────────────────────────────────────────────────
  db-sync:
    name: 'Job 10 — Database Sync'
    runs-on: ubuntu-latest
    needs: [financial-analyzer, valuation-engine, ai-scoring, news-sentiment]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install deps
        run: pip install requests
      - name: Merge & sync all data
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          import json, os, glob
          from scanners.base import deduplicate_ipos, IPOData
          DATA_DIR = 'data'

          # Load all scanner results
          all_ipos = []
          for f in glob.glob('data/scan_*.json'):
              try:
                  with open(f) as fh: data = json.load(fh)
                  for ipo_data in data.get('ipos', []):
                      ipo = IPOData(**{k: v for k, v in ipo_data.items()
                                       if k in IPOData.__dataclass_fields__})
                      all_ipos.append(ipo)
              except Exception as e:
                  print(f'  Error loading {f}: {e}')

          # Deduplicate
          unique = deduplicate_ipos(all_ipos)
          print(f'Dedup: {len(all_ipos)} -> {len(unique)}')

          # Load existing master database
          master_path = 'data/ipo_master_database.json'
          if os.path.exists(master_path):
              with open(master_path) as f: master = json.load(f)
          else:
              master = {'ipos': [], 'metadata': {'total': 0}}

          # Merge
          existing_map = {}
          for rec in master.get('ipos', []):
              existing_map[rec.get('id', '')] = rec
          new_count = 0
          for ipo in unique:
              id_key = ipo.id
              if id_key in existing_map:
                  existing = existing_map[id_key]
                  for k, v in ipo.to_dict().items():
                      if v and not existing.get(k):
                          existing[k] = v
              else:
                  existing_map[id_key] = ipo.to_dict()
                  new_count += 1
          merged = list(existing_map.values())

          # Save master database
          master = {'ipos': merged, 'metadata': {'total': len(merged), 'last_updated': __import__('datetime').datetime.now().isoformat()}}
          with open(master_path, 'w') as f: json.dump(master, f, indent=2, ensure_ascii=False)
          print(f'Master DB: {len(merged)} IPOs ({new_count} new)')

          # Generate stats summary
          from collections import Counter
          status_counts = Counter(ipo.get('status', 'unknown') for ipo in merged)
          country_counts = Counter(ipo.get('country', 'unknown') for ipo in merged)
          exchange_counts = Counter(ipo.get('exchange', 'unknown') for ipo in merged)
          stats = {'generated_at': __import__('datetime').datetime.now().isoformat(), 'total_ipos': len(merged),
                   'status_breakdown': dict(status_counts), 'country_breakdown': dict(country_counts),
                   'exchange_breakdown': dict(exchange_counts)}
          with open('data/ipo_stats_summary.json', 'w') as f: json.dump(stats, f, indent=2)
          print(f'Stats saved')
          "

      - name: Commit updated data
        run: |
          git config user.name "PulseTrends Bot"
          git config user.email "noreply@pulsetrends.in"
          git add data/ipo_master_database.json data/ipo_scores_ranking.json data/ipo_stats_summary.json data/financial_analysis.json data/valuation_results.json data/ai_scores.json data/news_sentiment.json data/scan_*.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Auto: global IPO scan & sync $(date +%F)"
          git push
