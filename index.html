<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050505" />
    <meta name="color-scheme" content="dark" />
    <meta name="keywords" content="IPO analysis, crypto airdrops, market news, AI investing, stock market, cryptocurrency, Nifty, Sensex, fintech" />
    <meta name="author" content="PulseTrends" />
    <meta name="robots" content="index,follow,max-image-preview:large" />

    <title>PulseTrends — IPO, Crypto & Market Intelligence</title>
    <meta name="description" content="AI-powered intelligence for IPOs, crypto airdrops, and market-moving news. Deep analysis, risk metrics, and actionable insights for modern investors." />
    <link rel="canonical" href="https://pulsetrends.in/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <!-- Performance: hint critical resources early -->
    <link rel="preload" href="/og-default.png" as="image" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="PulseTrends" />
    <meta property="og:title" content="PulseTrends — IPO, Crypto & Market Intelligence" />
    <meta property="og:description" content="AI-powered intelligence for IPOs, crypto airdrops, and market-moving news. Deep analysis, risk metrics, and actionable insights for modern investors." />
    <meta property="og:url" content="https://pulsetrends.in/" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-default.png" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PulseTrends — IPO, Crypto & Market Intelligence" />
    <meta name="twitter:description" content="AI-powered intelligence for IPOs, crypto airdrops, and market-moving news." />
    <meta name="twitter:image" content="/og-default.png" />

    <!-- Schema.org -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://pulsetrends.in/#website",
          "url": "https://pulsetrends.in",
          "name": "PulseTrends",
          "description": "AI-powered intelligence for IPOs, crypto airdrops, and market-moving news.",
          "inLanguage": "en-IN",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://pulsetrends.in/?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "@id": "https://pulsetrends.in/#organization",
          "name": "PulseTrends",
          "url": "https://pulsetrends.in",
          "logo": {
            "@type": "ImageObject",
            "url": "https://pulsetrends.in/og-default.png"
          },
          "sameAs": ["https://twitter.com/pulsetrends"]
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
